<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UV Monitoring System</title>

<link rel="stylesheet" href="style.css"/>

<!-- 🗺️ Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div class="topbar">
  🚨 EUROPEAN UV MONITORING SYSTEM — LIVE MODE 🚨
</div>

<h2 class="user">User: Σκαπούλη Πετρούλλα</h2>

<div class="container">

  <p id="topOfDay" class="top-day"></p>

  <button id="startBtn">START SCAN</button>

  <p id="status">Waiting for activation...</p>

  <div id="result" class="hidden">

    <h2 id="uvValue"></h2>
    <p id="message"></p>

    <div id="map"></div>

    <h3>European Monitoring Grid</h3>
    <input id="search" placeholder="Search city..." />
    <ul id="cityList"></ul>

  </div>

</div>

<audio id="alarm" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script src="script.js"></script>
</body>
</html>
