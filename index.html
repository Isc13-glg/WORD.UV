<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyNow</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<!-- ✅ INTRO -->
<div id="intro">
  <h1>☁️ SkyNow</h1>
  <div class="loader"></div>
</div>

<!-- ✅ MODE SCREEN -->
<div id="modeScreen" class="hidden">
  <h2>Choose Mode</h2>

  <button id="useLocation">📍 Use My Location</button>
  <button id="manualSelect">🌍 Manual Select</button>
  <button id="mapPick">🗺️ Pick From Map</button>
</div>

<!-- ✅ MAIN APP (your weather UI stays here) -->
<div id="app">

  <div id="viewingText">🌍 Viewing: --</div>

  <div id="weatherBox">
    <div>🌡️ <span id="temp"></span></div>
    <div>🤗 <span id="feels"></span></div>
    <div>☀️ <span id="uv"></span></div>
    <div>💨 <span id="wind"></span></div>
    <div>💧 <span id="hum"></span></div>
    <div>👁️ <span id="vis"></span></div>
  </div>

  <div id="map"></div>

</div>

<script src="script.js"></script>
</body>
</html>
