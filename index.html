<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SkyNow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- 🌟 WELCOME -->
<div id="welcome">
  <div class="welcomeCard">
    <h1>☁️ SkyNow</h1>
    <p>Loading live weather...</p>
  </div>
</div>

<div id="bg"></div>

<div id="mainScreen" class="screen">

  <div class="app">

    <h1 class="title">SkyNow</h1>

    <!-- 🌟 BIG WOW BUTTONS -->
    <div class="controls">

      <button id="startBtn" class="bigBtn">
        📍 Use My Location
      </button>

      <button id="manualBtn" class="bigBtn secondary">
        🌍 Choose Manually
      </button>

    </div>

    <div id="status">Select a mode</div>

    <div id="manualBox" class="hidden">
      <select id="countrySelect"></select>
      <button id="loadManual">Load Weather</button>
    </div>

    <div id="loader" class="hidden"></div>

    <!-- HERO -->
    <div id="mainCard" class="glass hidden">
      <div id="bigTemp">--°</div>
      <div id="conditionText">--</div>
    </div>

    <!-- CARDS -->
    <div id="cards" class="grid hidden">

      <div class="card">🌡️ <span id="temp"></span></div>
      <div class="card">🤗 <span id="feels"></span></div>
      <div class="card">☀️ <span id="uv"></span></div>
      <div class="card">💨 <span id="wind"></span></div>
      <div class="card">💧 <span id="hum"></span></div>
      <div class="card">👁️ <span id="vis"></span></div>

      <div class="card wide" id="sun"></div>

      <div class="card wide">
        <div id="map"></div>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
