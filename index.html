<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo">☁️ SkyNow</div>
  <div class="loader"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- MODE SELECT -->
  <div id="modeScreen">

    <h1>Choose Mode</h1>

    <button id="useLocation">📍 Use My Location</button>
    <button id="manual">🌍 Manual Select</button>
    <button id="mapMode">🗺️ Pick From Map</button>

    <div id="manualBox" class="hidden">
      <select id="countrySelect"></select>
      <button id="loadCountry">Load</button>
    </div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div id="locationText">🌍 Viewing: --</div>

    <div id="loader" class="hidden"></div>

    <div class="card">

      <div id="tempBig">--°</div>
      <div id="condition">--</div>

      <div class="grid">
        <div>🌡️ <span id="temp"></span></div>
        <div>🤗 <span id="feels"></span></div>
        <div>☀️ <span id="uv"></span></div>
        <div>💨 <span id="wind"></span></div>
        <div>💧 <span id="hum"></span></div>
        <div>👁️ <span id="vis"></span></div>
      </div>

    </div>

    <!-- MAP ALWAYS SMALL -->
    <div id="mapBox">

      <div id="mapControls">
        <button id="expand">⤢</button>
        <button id="minimise" class="hidden">⤡</button>
      </div>

      <div id="map"></div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
