<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Pro+</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="app">

  <div class="title">🌤 Weather Pro+</div>

  <button id="startBtn">Use My Location</button>
  <button id="manualBtn">Pick Country Manually</button>

  <div id="status">Choose a mode</div>

  <!-- 🌍 MANUAL PICKER -->
  <div id="manualBox" class="hidden">

    <select id="countrySelect"></select>
    <button id="loadCountry">Load Weather</button>

  </div>

  <!-- 🔄 LOADER -->
  <div id="loader" class="loader hidden"></div>

  <div id="card" class="hidden">

    <div class="grid">

      <div class="box" id="temp">🌡️ Temp</div>
      <div class="box" id="feels">🤗 Feels Like</div>
      <div class="box" id="uv">☀️ UV</div>
      <div class="box" id="wind">💨 Wind</div>
      <div class="box" id="hum">💧 Humidity</div>
      <div class="box" id="vis">👁️ Visibility</div>
      <div class="box" id="sun">🌅 Sun</div>
      <div class="box" id="cond">☁️ Condition</div>

    </div>

    <div id="msg"></div>

    <div id="map"></div>

  </div>

</div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="script.js"></script>
</body>
</html>
