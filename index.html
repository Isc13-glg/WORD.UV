<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SkyNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="bg"></div>

<div class="app">

<h1 class="title">SkyNow</h1>

<!-- MENU -->
<div class="menu">

  <button id="startBtn">📍 Location</button>
  <button id="manualBtn">🌍 Manual</button>
  <button id="mapSelectBtn">🗺️ Pick Map</button>

</div>

<div id="status">Choose a mode</div>

<!-- MANUAL -->
<div id="manualBox" class="hidden">
  <select id="countrySelect"></select>
  <button id="loadManual">Load</button>
</div>

<!-- LOADER -->
<div id="loader" class="hidden"></div>

<!-- WEATHER CARD -->
<div id="card" class="glass hidden">

  <div id="bigTemp">--°</div>
  <div id="conditionText">--</div>

  <div class="grid">
    <div>🌡️ <span id="temp"></span></div>
    <div>🤗 <span id="feels"></span></div>
    <div>☀️ <span id="uv"></span></div>
    <div>💨 <span id="wind"></span></div>
    <div>💧 <span id="hum"></span></div>
    <div>👁️ <span id="vis"></span></div>
  </div>

</div>

<!-- MAP ALWAYS VISIBLE -->
<div id="mapBox">

  <div id="mapControls">
    <button id="mapExpand">⤢</button>
    <button id="mapMinimise" class="hidden">⤡</button>
  </div>

  <div id="map"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
